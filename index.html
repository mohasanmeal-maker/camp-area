<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="./resources/ol.css">
<link rel="stylesheet" href="./resources/qgis2web.css">

<style>
html, body, #map {
    width: 100%;
    height: 100%;
    margin: 0;
}

.box {
    position:absolute;
    background:white;
    padding:6px 10px;
    font-size:10px;
    border-radius:5px;
    z-index:9999;
}
</style>

<title>Map</title>
</head>

<body>

<div id="map">

<!-- TITLE -->
<div style="position:absolute; top:5px; left:5px; background:#FFC000; padding:10px; font-size:12px; z-index:9999;">
Education for Rohingya Refugee Children and Host Community Children in Bangladesh<br>
<span style="font-style:italic;font-size:10px;">ECW MYRP II Funding Project</span>
</div>

<!-- LOGO -->
<div style="position:absolute; top:5px; right:5px; z-index:9999;">
<img src="FIVDB.jpg" style="height:50px;">
</div>

<!-- INFO -->
<div id="infoBox" class="box" style="bottom:80px; right:5px;">
Nearest LC info
</div>

<!-- LEGEND -->
<div class="box" style="bottom:120px; left:5px;">
<b>Legend</b><br>
🔴 Learning Center<br>
🟦 Route<br>
🔵 Your Location
</div>

<!-- POPUP -->
<div id="popup" style="position:absolute;background:white;padding:8px;border-radius:5px;display:none;z-index:9999;">
<div id="popup-content"></div>
<button onclick="closePopup()">Close</button>
</div>

</div>

<!-- SCRIPTS -->
<script src="./resources/ol.js"></script>
<script src="./layers/layers.js"></script>
<script src="./resources/qgis2web.js"></script>

<script>

// ===== POPUP =====
function closePopup(){
    document.getElementById("popup").style.display="none";
}

// ===== GPS =====
var geolocation = new ol.Geolocation({
    tracking: true,
    projection: map.getView().getProjection()
});

// USER POINT
var userFeature = new ol.Feature();

var userLayer = new ol.layer.Vector({
    source: new ol.source.Vector({
        features: [userFeature]
    }),
    style: new ol.style.Style({
        image: new ol.style.Circle({
            radius: 6,
            fill: new ol.style.Fill({color: 'blue'}),
            stroke: new ol.style.Stroke({color: '#fff', width: 2})
        })
    })
});

map.addLayer(userLayer);

// ROUTE
var routeSource = new ol.source.Vector();
var routeLayer = new ol.layer.Vector({
    source: routeSource,
    style: new ol.style.Style({
        stroke: new ol.style.Stroke({color: '#4F81BD', width: 2})
    })
});

map.addLayer(routeLayer);

// DISTANCE
function getDistance(a,b){
    var dx=a[0]-b[0];
    var dy=a[1]-b[1];
    return Math.sqrt(dx*dx+dy*dy);
}

// ===== MAIN GPS LOGIC =====
geolocation.on('change:position', function(){

    var userCoord = geolocation.getPosition();
    userFeature.setGeometry(new ol.geom.Point(userCoord));

    var features = json_FacilityInfo_4.features;
    var list = [];

    features.forEach(function(f){
        var coord = ol.proj.fromLonLat(f.geometry.coordinates);
        var d = getDistance(userCoord, coord);

        list.push({
            coord: coord,
            name: f.properties.Name,
            dist: d
        });
    });

    list.sort(function(a,b){return a.dist-b.dist;});
    list = list.slice(0,3);

    routeSource.clear();

    list.forEach(function(n){

        var line = new ol.Feature({
            geometry: new ol.geom.LineString([userCoord, n.coord])
        });
        routeSource.addFeature(line);

        var point = new ol.Feature({
            geometry: new ol.geom.Point(n.coord),
            name: n.name,
            distance: n.dist
        });

        point.setStyle(new ol.style.Style({
            image: new ol.style.Circle({
                radius: 8,
                fill: new ol.style.Fill({color:'#4F81BD'}),
                stroke: new ol.style.Stroke({color:'#fff',width:2})
            })
        }));

        routeSource.addFeature(point);
    });

    // SHOW INFO
    var first=list[0];
    if(first){
        var d = first.dist>1000 ? (first.dist/1000).toFixed(2)+" km" : Math.round(first.dist)+" m";

        document.getElementById("infoBox").innerHTML=
        "Nearest LC: "+first.name+"<br>Distance: "+d;

        map.getView().animate({
            center:first.coord,
            zoom:17,
            duration:1000
        });
    }

});

// ===== CLICK POPUP =====
map.on('singleclick', function(evt){
    map.forEachFeatureAtPixel(evt.pixel,function(f){

        var name=f.get('name');
        var dist=f.get('distance');

        if(name){
            var d=dist>1000?(dist/1000).toFixed(2)+" km":Math.round(dist)+" m;

            document.getElementById("popup-content").innerHTML=
            "<b>"+name+"</b><br>Distance: "+d;

            var p=document.getElementById("popup");
            p.style.display="block";
            p.style.left=evt.pixel[0]+"px";
            p.style.top=evt.pixel[1]+"px";
        }
    });
});

</script>

</body>
</html>
