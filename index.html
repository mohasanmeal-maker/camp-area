<!-- GPS CODE -->
<script>
var geolocation = new ol.Geolocation({
    tracking: true,
    projection: map.getView().getProjection()
});

geolocation.on('change:position', function() {
    var coordinates = geolocation.getPosition();
    var userFeature = new ol.Feature(new ol.geom.Point(coordinates));

    var userLayer = new ol.layer.Vector({
        source: new ol.source.Vector({
            features: [userFeature]
        }),
        style: new ol.style.Style({
            image: new ol.style.Circle({
                radius: 6,
                fill: new ol.style.Fill({color: 'blue'}),
                stroke: new ol.style.Stroke({color: '#fff', width: 2})
            })
        })
    });

    map.addLayer(userLayer);
});
</script>

<!-- ROUTE CODE -->
<script>
function getDistance(coord1, coord2) {
    var dx = coord1[0] - coord2[0];
    var dy = coord1[1] - coord2[1];
    return Math.sqrt(dx * dx + dy * dy);
}

var routeSource = new ol.source.Vector();
var routeLayer = new ol.layer.Vector({
    source: routeSource,
    style: new ol.style.Style({
        stroke: new ol.style.Stroke({
            color: 'red',
            width: 2
        })
    })
});

map.addLayer(routeLayer);

geolocation.on('change:position', function() {

    var userCoord = geolocation.getPosition();

    var features = json_FacilityInfo_4.features;

    var nearestFeature = null;
    var minDistance = Infinity;

    features.forEach(function(f) {
        var coord = ol.proj.fromLonLat(f.geometry.coordinates);
        var dist = getDistance(userCoord, coord);

        if (dist < minDistance) {
            minDistance = dist;
            nearestFeature = coord;
        }
    });

    if (nearestFeature) {
        routeSource.clear();

        var line = new ol.Feature({
            geometry: new ol.geom.LineString([userCoord, nearestFeature])
        });

        routeSource.addFeature(line);
    }
});
</script>
