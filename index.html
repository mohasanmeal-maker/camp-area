        <script src="layers/SubBlockt20240519_a3_camp_subblock_outlines_1.js"></script><script src="layers/Blockt20240519_a2_camp_block_outlines_2.js"></script><script src="layers/Campt20230412_a1_camp_outlines_3.js"></script><script src="layers/FacilityInfo_4.js"></script>
        <script src="styles/SubBlockt20240519_a3_camp_subblock_outlines_1_style.js"></script><script src="styles/Blockt20240519_a2_camp_block_outlines_2_style.js"></script><script src="styles/Campt20230412_a1_camp_outlines_3_style.js"></script><script src="styles/FacilityInfo_4_style.js"></script>

        <script src="./resources/qgis2web.js"></script> 
<script>

// ===== GPS + Top 3 Nearest =====

var geolocation = new ol.Geolocation({
    tracking: true,
    projection: map.getView().getProjection()
});

// user location
var userFeature = new ol.Feature();
var userSource = new ol.source.Vector({ features: [userFeature] });

var userLayer = new ol.layer.Vector({
    source: userSource,
    style: new ol.style.Style({
        image: new ol.style.Circle({
            radius: 6,
            fill: new ol.style.Fill({color: 'blue'}),
            stroke: new ol.style.Stroke({color: '#fff', width: 2})
        })
    })
});
map.addLayer(userLayer);

// route layer
var routeSource = new ol.source.Vector();
var routeLayer = new ol.layer.Vector({
    source: routeSource,
    style: new ol.style.Style({
        stroke: new ol.style.Stroke({color: '#4F81BD', width: 2})
    })
});
map.addLayer(routeLayer);

// distance function
function getDistance(a, b) {
    var dx = a[0] - b[0];
    var dy = a[1] - b[1];
    return Math.sqrt(dx*dx + dy*dy);
}

// GPS update
geolocation.on('change:position', function() {

    var userCoord = geolocation.getPosition();
    userFeature.setGeometry(new ol.geom.Point(userCoord));

    var features = json_FacilityInfo_4.features;

    var nearestList = [];

    features.forEach(function(f){
        var coord = ol.proj.fromLonLat(f.geometry.coordinates);
        var d = getDistance(userCoord, coord);

        nearestList.push({
            coord: coord,
            name: f.properties.Name,
            dist: d
        });
    });

    // sort by distance
    nearestList.sort(function(a,b){ return a.dist - b.dist; });

    // take top 3
    nearestList = nearestList.slice(0,3);

    routeSource.clear();

    nearestList.forEach(function(n){

        // line
        var line = new ol.Feature({
            geometry: new ol.geom.LineString([userCoord, n.coord])
        });
        routeSource.addFeature(line);

        // point
        var point = new ol.Feature({
            geometry: new ol.geom.Point(n.coord),
            name: n.name,
            distance: n.dist
        });

        point.setStyle(new ol.style.Style({
            image: new ol.style.Circle({
                radius: 8,
                fill: new ol.style.Fill({ color: '#4F81BD' }),
                stroke: new ol.style.Stroke({ color: '#ffffff', width: 2 })
            })
        }));

        routeSource.addFeature(point);
    });

    // first nearest info
    var first = nearestList[0];

    if(first){

        var dist;
        if(first.dist > 1000){
            dist = (first.dist/1000).toFixed(2) + " km";
        }else{
            dist = Math.round(first.dist) + " m";
        }

        document.getElementById("infoBox").innerHTML =
        "Nearest LC: " + first.name + "<br>Distance: " + dist;

        // auto zoom FIXED
        map.getView().animate({
            center: first.coord,
            zoom: 17,
            duration: 1000
        });
    }

});
</script>
